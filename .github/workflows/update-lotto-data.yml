name: Update lotto data

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-lotto-data.yml
  schedule:
    # GitHub Actions uses UTC. These run every Saturday at 20:45, 21:10,
    # and 21:30 KST so the app can update soon after the draw result appears.
    - cron: "45 11 * * 6"
    - cron: "10 12 * * 6"
    - cron: "30 12 * * 6"
    # Safety retry on Sunday at 09:30 KST in case the first request was delayed.
    - cron: "30 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lotto-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply lotto UI and prize-row patch
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          function read(path) {
            return fs.readFileSync(path, 'utf8');
          }

          function writeIfChanged(path, next) {
            const current = read(path);
            if (current !== next) fs.writeFileSync(path, next, 'utf8');
          }

          function replaceOrThrow(text, from, to, label) {
            if (text.includes(to)) return text;
            if (!text.includes(from)) throw new Error(`Could not find ${label}`);
            return text.replace(from, to);
          }

          let html = read('index.html');
          if (!html.includes('id="drawSelect"')) {
            html = html.replace(
              '<p>동행복권 공개 데이터를 기준으로 표시합니다</p>',
              `<label class="draw-select-label" for="drawSelect">
                <span>회차 선택</span>
                <select id="drawSelect" aria-label="당첨번호 회차 선택"></select>
              </label>`,
            );
          }
          html = html.replaceAll('feedback-v79', 'feedback-v80').replaceAll('feedback-v78', 'feedback-v80');
          writeIfChanged('index.html', html);

          let app = read('app.js');
          if (!app.includes('const drawSelect = document.querySelector("#drawSelect");')) {
            app = replaceOrThrow(
              app,
              '  const latestDrawResult = document.querySelector("#latestDrawResult");',
              '  const latestDrawResult = document.querySelector("#latestDrawResult");\n  const drawSelect = document.querySelector("#drawSelect");',
              'drawSelect query',
            );
          }
          if (!app.includes('function drawByNumber(drawNo)')) {
            const helper = String.raw`
  function drawByNumber(drawNo) {
    const parsed = Number(drawNo);
    return draws.find((item) => item.draw === parsed) ?? latest;
  }

  function selectedDrawForResult() {
    return drawByNumber(drawSelect?.value || latest?.draw);
  }

  function renderDrawSelect() {
    if (!drawSelect || !draws.length) return;
    const currentValue = drawSelect.value || String(latest?.draw ?? "");
    drawSelect.innerHTML = draws
      .slice()
      .reverse()
      .map((draw) => `<option value="${draw.draw}">${draw.draw}회</option>`)
      .join("");
    drawSelect.value = draws.some((draw) => String(draw.draw) === currentValue)
      ? currentValue
      : String(latest?.draw ?? "");
  }

  function prizeTierFromDraw(draw, rank) {
    const tier = draw?.prizeTiers?.[String(rank)];
    const prefix = ["", "first", "second", "third", "fourth", "fifth"][rank];
    return {
      rank,
      winners: Number(tier?.winners ?? draw?.[`${prefix}Winners`] ?? 0),
      prize: Number(tier?.prize ?? draw?.[`${prefix}Prize`] ?? 0),
      totalPrize: Number(tier?.totalPrize ?? draw?.[`${prefix}TotalPrize`] ?? 0),
      criteria: tier?.criteria ?? "",
    };
  }

  function renderPrizeTierCard(draw, rank) {
    const tier = prizeTierFromDraw(draw, rank);
    const hasData = tier.winners > 0 || tier.prize > 0 || tier.totalPrize > 0;
    const className = rank === 1 ? " first" : rank === 2 ? " second" : "";
    return `
      <div class="draw-prize-card${className}">
        <span>${rank}등</span>
        <strong>${hasData ? `${formatNumber(tier.winners)}명` : "정보 없음"}</strong>
        <em>${hasData ? `1게임당 ${formatMoney(tier.prize)}` : "동행복권 결과표 갱신 후 표시"}</em>
      </div>
    `;
  }

  function renderDrawResult(draw = selectedDrawForResult()) {
    if (!latestDrawResult || !draw) return;
    latestDrawResult.innerHTML = `
      <div class="draw-result-card">
        <div class="draw-result-main">
          <strong>${draw.draw}회 당첨결과</strong>
          <span>${draw.date || ""} 추첨</span>
          <div class="draw-balls">
            ${draw.numbers.map(renderBall).join("")}
            <b class="draw-plus">+</b>
            <span class="bonus-wrap">
              <b class="ball bonus-ball ${rangeClass(draw.bonus)}">${draw.bonus}</b>
              <small>보너스</small>
            </span>
          </div>
        </div>
        <div class="draw-prize-grid">
          ${[1, 2, 3, 4, 5].map((rank) => renderPrizeTierCard(draw, rank)).join("")}
        </div>
      </div>
    `;
  }
`;
            app = replaceOrThrow(app, '\n  function renderStaticSummary() {', `\n${helper}\n  function renderStaticSummary() {`, 'renderStaticSummary insertion point');
          }
          app = app.replace('    renderLatestDrawResult();', '    renderDrawSelect();\n    renderDrawResult();');
          if (!app.includes('drawSelect?.addEventListener("change", () => renderDrawResult());')) {
            app = replaceOrThrow(
              app,
              '    renderFirstPaintPanels();\n    afterNextPaint(() => {',
              '    renderFirstPaintPanels();\n    drawSelect?.addEventListener("change", () => renderDrawResult());\n    afterNextPaint(() => {',
              'draw select listener',
            );
          }
          writeIfChanged('app.js', app);

          let css = read('styles.css');
          if (!css.includes('.draw-select-label')) {
            css = css.replace(
              '.draw-result-panel {\n  margin-top: 12px;\n}\n\n',
              `.draw-result-panel {
  margin-top: 12px;
}

.draw-select-label {
  display: grid;
  gap: 5px;
  min-width: 150px;
  margin: 0;
}

.draw-select-label span {
  color: var(--muted);
  font-size: 0.76rem;
  font-weight: 900;
}

.draw-select-label select {
  min-height: 38px;
  border: 1px solid rgba(24, 169, 153, 0.24);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.92);
  color: var(--ink);
  padding: 0 34px 0 12px;
  font-weight: 900;
}

`,
            );
          }
          css = css.replace('.draw-prize-grid {\n  display: grid;\n  gap: 10px;\n}', '.draw-prize-grid {\n  display: grid;\n  grid-template-columns: repeat(2, minmax(0, 1fr));\n  gap: 10px;\n}');
          if (!css.includes('#latestNumbers .ball')) {
            css += `
#latestNumbers {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
}

#latestNumbers .ball,
.draw-balls .ball,
.ball.range-4 {
  color: #fff !important;
  text-shadow: 0 1px 1px rgba(0, 0, 0, 0.18);
}

#latestNumbers .ball {
  width: 30px;
  min-width: 30px;
  font-size: 0.82rem;
  line-height: 1;
}

@media (max-width: 640px) {
  .draw-prize-grid {
    grid-template-columns: 1fr;
  }

  .draw-select-label {
    width: 100%;
  }
}
`;
          }
          writeIfChanged('styles.css', css);

          let tool = read('tools/update-lotto-data.mjs');
          if (!tool.includes('const RECENT_PRIZE_ROW_ENRICH_COUNT = 120;')) {
            tool = tool.replace(
              'const FULLAYER_URL =\n  "https://www.fullayer.com/lottowinnumber/fo/lottowinnumberlist3";',
              'const FULLAYER_URL =\n  "https://www.fullayer.com/lottowinnumber/fo/lottowinnumberlist3";\nconst RECENT_PRIZE_ROW_ENRICH_COUNT = 120;',
            );
          }
          if (!tool.includes('function applyPrizeRows(draw, prizeRows)')) {
            tool = tool.replace(
              /async function enrichOfficialPrizeRows\(draw\) \{[\s\S]*?\n\}\n\nasync function fetchOfficialLatestDraw\(\) \{/,
              `async function enrichOfficialPrizeRows(draw) {\n  try {\n    const prizeRows = await fetchOfficialPrizeRows(draw.draw);\n    applyPrizeRows(draw, prizeRows);\n  } catch {\n    // The JSON endpoint is enough for first-prize data; prize rows are a nice-to-have.\n  }\n  return draw;\n}\n\nasync function fetchOfficialLatestDraw() {`,
            );
            tool = tool.replace(
              '    prizes[rank] = {\n      winners: parseMoney(cells[rankIndex + 2] ?? "0"),\n      prize: parseMoney(cells[rankIndex + 3] ?? "0"),\n      totalPrize: parseMoney(cells[rankIndex + 4] ?? "0"),\n    };',
              '    prizes[rank] = {\n      rank,\n      totalPrize: parseMoney(cells[rankIndex + 1] ?? "0"),\n      winners: parseMoney(cells[rankIndex + 2] ?? "0"),\n      prize: parseMoney(cells[rankIndex + 3] ?? "0"),\n      criteria: stripTags(cells[rankIndex + 4] ?? ""),\n      note: stripTags(cells[rankIndex + 5] ?? ""),\n    };',
            );
            tool = tool.replace(
              '\nasync function fetchOfficialPrizeRows(drawNo) {',
              `\nfunction applyPrizeRows(draw, prizeRows) {\n  const normalized = {};\n\n  for (const [rank, row] of Object.entries(prizeRows)) {\n    if (!row || !Number(rank)) continue;\n    normalized[rank] = {\n      rank: Number(rank),\n      totalPrize: Number(row.totalPrize ?? 0),\n      winners: Number(row.winners ?? 0),\n      prize: Number(row.prize ?? 0),\n      criteria: row.criteria ?? "",\n      note: row.note ?? "",\n    };\n  }\n\n  if (!Object.keys(normalized).length) return draw;\n\n  draw.prizeTiers = normalized;\n  for (const rank of [1, 2, 3, 4, 5]) {\n    const row = normalized[String(rank)];\n    if (!row) continue;\n    const prefix = ["", "first", "second", "third", "fourth", "fifth"][rank];\n    draw[`${prefix}Winners`] = row.winners;\n    draw[`${prefix}Prize`] = row.prize;\n    draw[`${prefix}TotalPrize`] = row.totalPrize;\n  }\n\n  return draw;\n}\n\nasync function fetchOfficialPrizeRows(drawNo) {`,
            );
          }
          tool = tool.replace('draws.slice(-12)', 'draws.slice(-RECENT_PRIZE_ROW_ENRICH_COUNT)');
          if (!tool.includes('sorted.slice(-RECENT_PRIZE_ROW_ENRICH_COUNT)')) {
            tool = tool.replace(
              '  if (sorted.length < 1000) {\n    throw new Error(`Fallback dataset looked incomplete: ${sorted.length} draws.`);\n  }\n\n  return {',
              '  if (sorted.length < 1000) {\n    throw new Error(`Fallback dataset looked incomplete: ${sorted.length} draws.`);\n  }\n\n  for (const draw of sorted.slice(-RECENT_PRIZE_ROW_ENRICH_COUNT)) {\n    await enrichOfficialPrizeRows(draw);\n  }\n\n  return {',
            );
          }
          writeIfChanged('tools/update-lotto-data.mjs', tool);

          let sw = read('service-worker.js');
          sw = sw.replace(/saju-lotto-v\d+/g, 'saju-lotto-v85').replaceAll('feedback-v79', 'feedback-v80').replaceAll('feedback-v78', 'feedback-v80');
          writeIfChanged('service-worker.js', sw);
          NODE

      - name: Read current draw number
        id: before
        run: |
          latest=$(node -e "const fs=require('node:fs'); console.log(JSON.parse(fs.readFileSync('data/lotto-results.json','utf8')).latestDraw)")
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Fetch latest draw data
        run: npm run update:data

      - name: Check updated draw number
        id: after
        run: |
          latest=$(node -e "const fs=require('node:fs'); console.log(JSON.parse(fs.readFileSync('data/lotto-results.json','utf8')).latestDraw)")
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Validate lottery data
        run: npm run validate:data -- lotto

      - name: Rebuild recall optimization profile
        run: npm run optimize:recall

      - name: Validate app files
        run: npm run check

      - name: Commit updated lotto data and recall profile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html styles.css service-worker.js tools/update-lotto-data.mjs data/lotto-results.json data/lotto-results.js data/lotto-recall-profile.json data/lotto-recall-profile.js
          if git diff --cached --quiet; then
            echo "No lotto data, recall profile, or UI changes to commit. Current latest draw is ${{ steps.after.outputs.latest }}."
            exit 0
          fi
          git commit -m "Update lotto draw prizes and UI to draw ${{ steps.after.outputs.latest }}"
          git push origin HEAD:${{ github.ref_name }}
