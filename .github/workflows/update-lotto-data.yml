name: Update lotto data

on:
  schedule:
    - cron: "45 11 * * 6" # 20:45 KST Saturday
    - cron: "10 12 * * 6" # 21:10 KST Saturday
    - cron: "30 12 * * 6" # 21:30 KST Saturday
    - cron: "30 0 * * 0" # Sunday safety retry
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lotto-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply draw result UI patch
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const writeIfChanged = (file, next) => {
            const before = fs.readFileSync(file, 'utf8');
            if (before !== next) {
              fs.writeFileSync(file, next);
              console.log(`Updated ${file}`);
            } else {
              console.log(`${file} already up to date`);
            }
          };

          const replaceOnce = (text, from, to, label) => {
            if (text.includes(to)) return text;
            if (!text.includes(from)) {
              console.log(`Skipped ${label}: target text not found`);
              return text;
            }
            return text.replace(from, to);
          };

          let index = fs.readFileSync('index.html', 'utf8');
          if (!index.includes('id="drawSelect"')) {
            index = replaceOnce(
              index,
              '<p>동행복권 공개 데이터를 기준으로 표시합니다</p>',
              `<label class="draw-select-label" for="drawSelect">
                <span>회차 선택</span>
                <select id="drawSelect" aria-label="당첨번호 회차 선택"></select>
              </label>`,
              'draw selector markup',
            );
          }
          index = index.replace(/feedback-v\d+/g, 'feedback-v87');
          writeIfChanged('index.html', index);

          let styles = fs.readFileSync('styles.css', 'utf8');
          if (!styles.includes('.draw-select-label')) {
            styles = styles.replace(
              '.draw-result-panel {\n  margin-top: 12px;\n}\n',
              `.draw-result-panel {
  margin-top: 12px;
}

.draw-select-label {
  display: grid;
  gap: 6px;
  justify-items: end;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 900;
}

.draw-select-label select {
  min-width: 132px;
  border: 1px solid rgba(24, 169, 153, 0.22);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.9);
  color: var(--ink);
  font: inherit;
  font-weight: 900;
  padding: 8px 10px;
}
`,
            );
          }
          styles = styles.replace(
            '.draw-prize-grid {\n  display: grid;\n  gap: 10px;\n}',
            `.draw-prize-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
  gap: 10px;
}`,
          );
          if (!styles.includes('#latestNumbers .ball {\n  color: #fff;')) {
            styles += `

#latestNumbers .ball,
.draw-balls .ball {
  color: #fff;
}
`;
          }
          writeIfChanged('styles.css', styles);

          let app = fs.readFileSync('app.js', 'utf8');
          if (!app.includes('const drawSelect = document.querySelector("#drawSelect");')) {
            const drawSelectConstant = [
              '  const latestDrawResult = document.querySelector("#latestDrawResult");',
              '  const drawSelect = document.querySelector("#drawSelect");',
            ].join('\n');
            app = replaceOnce(
              app,
              '  const latestDrawResult = document.querySelector("#latestDrawResult");',
              drawSelectConstant,
              'draw select constant',
            );
          }

          const drawFunctions = [
            '  function drawByNumber(drawNo) {',
            '    const parsed = Number(drawNo);',
            '    return draws.find((item) => item.draw === parsed) ?? latest;',
            '  }',
            '',
            '  function selectedDrawForResult() {',
            '    return drawByNumber(drawSelect?.value || latest?.draw);',
            '  }',
            '',
            '  function renderDrawSelect() {',
            '    if (!drawSelect || !draws.length) return;',
            '    const currentValue = drawSelect.value || String(latest?.draw ?? "");',
            '    drawSelect.innerHTML = draws',
            '      .slice()',
            '      .reverse()',
            '      .map((draw) => `<option value="${draw.draw}">${draw.draw}회</option>`)',
            '      .join("");',
            '    drawSelect.value = draws.some((draw) => String(draw.draw) === currentValue)',
            '      ? currentValue',
            '      : String(latest?.draw ?? "");',
            '  }',
            '',
            '  function prizeTierFromDraw(draw, rank) {',
            '    const tier = draw?.prizeTiers?.[String(rank)];',
            '    const prefix = ["", "first", "second", "third", "fourth", "fifth"][rank];',
            '    return {',
            '      rank,',
            '      winners: Number(tier?.winners ?? draw?.[`${prefix}Winners`] ?? 0),',
            '      prize: Number(tier?.prize ?? draw?.[`${prefix}Prize`] ?? 0),',
            '      totalPrize: Number(tier?.totalPrize ?? draw?.[`${prefix}TotalPrize`] ?? 0),',
            '      criteria: tier?.criteria ?? "",',
            '    };',
            '  }',
            '',
            '  function renderPrizeTierCard(draw, rank) {',
            '    const tier = prizeTierFromDraw(draw, rank);',
            '    const hasData = tier.winners > 0 || tier.prize > 0 || tier.totalPrize > 0;',
            '    const className = rank === 1 ? " first" : rank === 2 ? " second" : "";',
            '    return `',
            '      <div class="draw-prize-card${className}">',
            '        <span>${rank}등</span>',
            '        <strong>${hasData ? `${formatNumber(tier.winners)}명` : "정보 없음"}</strong>',
            '        <em>${hasData ? `1게임당 ${formatMoney(tier.prize)}` : "동행복권 결과 갱신 후 표시"}</em>',
            '      </div>',
            '    `;',
            '  }',
            '',
            '  function renderDrawResult(draw = selectedDrawForResult()) {',
            '    if (!latestDrawResult || !draw) return;',
            '    latestDrawResult.innerHTML = `',
            '      <div class="draw-result-card">',
            '        <div class="draw-result-main">',
            '          <strong>${draw.draw}회 당첨결과</strong>',
            '          <span>${draw.date || ""} 추첨</span>',
            '          <div class="draw-balls">',
            '            ${draw.numbers.map(renderBall).join("")}',
            '            <b class="draw-plus">+</b>',
            '            <span class="bonus-wrap">',
            '              <b class="ball bonus-ball ${rangeClass(draw.bonus)}">${draw.bonus}</b>',
            '              <small>보너스</small>',
            '            </span>',
            '          </div>',
            '        </div>',
            '        <div class="draw-prize-grid">',
            '          ${[1, 2, 3, 4, 5].map((rank) => renderPrizeTierCard(draw, rank)).join("")}',
            '        </div>',
            '      </div>',
            '    `;',
            '  }',
          ].join('\n');

          if (!app.includes('function renderDrawResult(')) {
            const start = app.indexOf('  function renderLatestDrawResult() {');
            const end = app.indexOf('  function renderStaticSummary() {', start);
            if (start !== -1 && end !== -1) {
              app = `${app.slice(0, start)}${drawFunctions}\n\n${app.slice(end)}`;
            } else {
              console.log('Skipped draw renderer replacement: function boundary not found');
            }
          }

          app = app.replace('    renderLatestDrawResult();', ['    renderDrawSelect();', '    renderDrawResult();'].join('\n'));

          if (!app.includes('drawSelect?.addEventListener("change", () => renderDrawResult());')) {
            app = app.replace(
              '    for (const control of [\n',
              ['    drawSelect?.addEventListener("change", () => renderDrawResult());', '', '    for (const control of [\n'].join('\n'),
            );
          }
          writeIfChanged('app.js', app);

          let sw = fs.readFileSync('service-worker.js', 'utf8');
          sw = sw.replace(/saju-lotto-v\d+/g, 'saju-lotto-v87').replace(/feedback-v\d+/g, 'feedback-v87');
          writeIfChanged('service-worker.js', sw);
          NODE

      - name: Fetch latest draw data
        run: |
          npm run update:data || echo "Latest lotto fetch failed or no new draw exists yet. Keeping existing data."

      - name: Try enrich latest prize rows
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const jsonPath = 'data/lotto-results.json';
          const jsPath = 'data/lotto-results.js';
          const prefixes = ['', 'first', 'second', 'third', 'fourth', 'fifth'];
          const fallbackPrizeRows = {
            1227: [
              { rank: 1, totalPrize: 29422893005, winners: 11, prize: 2674808455, criteria: '6개번호 일치', note: '' },
              { rank: 2, totalPrize: 4903815560, winners: 70, prize: 70054508, criteria: '5개번호 일치 + 보너스번호 일치', note: '' },
              { rank: 3, totalPrize: 4903816554, winners: 3042, prize: 1612037, criteria: '5개번호 일치', note: '' },
              { rank: 4, totalPrize: 7594050000, winners: 151881, prize: 50000, criteria: '4개번호 일치', note: '' },
              { rank: 5, totalPrize: 12616705000, winners: 2523341, prize: 5000, criteria: '3개번호 일치', note: '' },
            ],
          };

          const normalizeWon = (value) => {
            const amount = Number(String(value || '').replace(/[^0-9]/g, ''));
            return Number.isFinite(amount) ? amount : 0;
          };

          const stripTags = (value) => String(value || '')
            .replace(/<script[\s\S]*?<\/script>/gi, '')
            .replace(/<style[\s\S]*?<\/style>/gi, '')
            .replace(/<[^>]*>/g, ' ')
            .replace(/&nbsp;/g, ' ')
            .replace(/&amp;/g, '&')
            .replace(/\s+/g, ' ')
            .trim();

          const parsePrizeRows = (html) => {
            const rows = [];
            const rowRegex = /<tr[^>]*>([\s\S]*?)<\/tr>/gi;
            let match;
            while ((match = rowRegex.exec(html))) {
              const cells = [...match[1].matchAll(/<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/gi)].map((cell) => stripTags(cell[1]));
              const rankCell = cells.find((cell) => /^\d등$/.test(cell));
              if (!rankCell) continue;

              const rank = Number(rankCell.replace(/[^0-9]/g, ''));
              const numericCells = cells.map(normalizeWon).filter((value) => value > 0);
              const winnersCandidate = cells.map((cell) => {
                const compact = cell.replace(/,/g, '').trim();
                return /^\d+$/.test(compact) ? Number(compact) : 0;
              }).find((value) => value > 0 && value < 100000000);

              rows.push({
                rank,
                totalPrize: numericCells[0] || 0,
                winners: winnersCandidate || 0,
                prize: numericCells.length > 1 ? numericCells[1] : numericCells[0] || 0,
                criteria: cells.find((cell) => cell.includes('번호') || cell.includes('일치')) || '',
                note: cells[cells.length - 1] || '',
              });
            }
            return rows.filter((row) => row.rank >= 1 && row.rank <= 5);
          };

          const applyPrizeRows = (draw, rows) => {
            draw.prizeTiers = Object.fromEntries(rows.map((row) => [String(row.rank), row]));
            for (const row of rows) {
              const prefix = prefixes[row.rank];
              if (!prefix) continue;
              draw[`${prefix}Winners`] = row.winners;
              draw[`${prefix}Prize`] = row.prize;
              draw[`${prefix}TotalPrize`] = row.totalPrize;
            }
          };

          async function main() {
            if (!fs.existsSync(jsonPath)) {
              console.log('lotto-results.json not found. Skipping prize enrichment.');
              return;
            }

            const data = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
            const draws = data.draws || data.results || [];
            const latestDraw = data.latestDraw || draws[draws.length - 1]?.draw;
            const latest = draws.find((item) => Number(item.draw) === Number(latestDraw));
            if (!latestDraw || !latest) {
              console.log('No latest draw found. Skipping prize enrichment.');
              return;
            }

            let prizeRows = [];
            try {
              const response = await fetch(`https://www.dhlottery.co.kr/gameResult.do?method=byWin&drwNo=${latestDraw}`, {
                headers: {
                  'user-agent': 'Mozilla/5.0 GitHub Actions lotto data updater',
                  'accept-language': 'ko-KR,ko;q=0.9,en-US;q=0.8,en;q=0.7',
                },
              });

              if (response.ok) {
                prizeRows = parsePrizeRows(await response.text());
              } else {
                console.log(`Prize page responded ${response.status}.`);
              }
            } catch (error) {
              console.log(`Prize page fetch skipped safely: ${error.message}`);
            }

            if (!prizeRows.length && fallbackPrizeRows[latestDraw]) {
              prizeRows = fallbackPrizeRows[latestDraw];
              console.log(`Using verified fallback prize rows for draw ${latestDraw}.`);
            }

            if (!prizeRows.length) {
              console.log('Prize rows were not found. Keeping existing prize fields.');
              return;
            }

            applyPrizeRows(latest, prizeRows);
            data.generatedAt = new Date().toISOString();
            fs.writeFileSync(jsonPath, `${JSON.stringify(data, null, 2)}\n`);
            fs.writeFileSync(jsPath, `window.LOTTO_RESULTS = ${JSON.stringify(data, null, 2)};\n`);
            console.log(`Prize rows enriched for draw ${latestDraw}.`);
          }

          main();
          NODE

      - name: Validate lottery data
        run: npm run validate:data -- lotto

      - name: Rebuild recall optimization profile
        run: |
          npm run optimize:recall || echo "Recall optimization skipped. Keeping the current profile."

      - name: Validate app files
        run: npm run check

      - name: Commit updated lotto data and UI
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app.js styles.css service-worker.js data/lotto-results.json data/lotto-results.js data/lotto-recall-profile.json data/lotto-recall-profile.js
          if git diff --cached --quiet; then
            echo "No lotto data changes to commit."
          else
            git commit -m "Update lotto data and draw result UI"
            git push origin HEAD:${{ github.ref_name }}
          fi
