name: Update lotto data

on:
  schedule:
    # GitHub Actions uses UTC. These run every Saturday at 20:45, 21:10,
    # and 21:30 KST so the app can update soon after the draw result appears.
    - cron: "45 11 * * 6"
    - cron: "10 12 * * 6"
    - cron: "30 12 * * 6"
    # Safety retry on Sunday at 09:30 KST in case the first request was delayed.
    - cron: "30 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lotto-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read current draw number
        id: before
        run: |
          latest=$(node -e "const fs=require('node:fs'); console.log(JSON.parse(fs.readFileSync('data/lotto-results.json','utf8')).latestDraw)")
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Fetch latest draw data
        run: npm run update:data

      - name: Check updated draw number
        id: after
        run: |
          latest=$(node -e "const fs=require('node:fs'); console.log(JSON.parse(fs.readFileSync('data/lotto-results.json','utf8')).latestDraw)")
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Validate lottery data
        run: npm run validate:data -- lotto

      - name: Rebuild recall optimization profile
        run: npm run optimize:recall

      - name: Validate app files
        run: npm run check

      - name: Commit updated lotto data and recall profile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lotto-results.json data/lotto-results.js data/lotto-recall-profile.json data/lotto-recall-profile.js
          if git diff --cached --quiet; then
            echo "No lotto data or recall profile changes to commit. Current latest draw is ${{ steps.after.outputs.latest }}."
            exit 0
          fi
          git commit -m "Update lotto data to draw ${{ steps.after.outputs.latest }}"
          git push origin HEAD:${{ github.ref_name }}
