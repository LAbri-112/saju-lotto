name: Update lotto data

on:
  schedule:
    # GitHub Actions uses UTC. These run every Saturday after draw results usually appear.
    - cron: "45 11 * * 6" # 20:45 KST Saturday
    - cron: "10 12 * * 6" # 21:10 KST Saturday
    - cron: "30 12 * * 6" # 21:30 KST Saturday
    # Safety retry on Sunday morning KST.
    - cron: "30 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lotto-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest draw data
        run: |
          npm run update:data || echo "Latest lotto fetch failed or no new draw exists yet. Keeping existing data."

      - name: Try enrich latest prize rows
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const jsonPath = 'data/lotto-results.json';
          const jsPath = 'data/lotto-results.js';

          const normalizeWon = (value) => {
            const amount = Number(String(value || '').replace(/[^0-9]/g, ''));
            return Number.isFinite(amount) ? amount : 0;
          };

          const stripTags = (value) => String(value || '')
            .replace(/<script[\s\S]*?<\/script>/gi, '')
            .replace(/<style[\s\S]*?<\/style>/gi, '')
            .replace(/<[^>]*>/g, ' ')
            .replace(/&nbsp;/g, ' ')
            .replace(/&amp;/g, '&')
            .replace(/\s+/g, ' ')
            .trim();

          const parsePrizeRows = (html) => {
            const rows = [];
            const rowRegex = /<tr[^>]*>([\s\S]*?)<\/tr>/gi;
            let match;
            while ((match = rowRegex.exec(html))) {
              const cells = [...match[1].matchAll(/<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/gi)].map((cell) => stripTags(cell[1]));
              const rankCell = cells.find((cell) => /^\d등$/.test(cell));
              if (!rankCell) continue;

              const rank = Number(rankCell.replace(/[^0-9]/g, ''));
              const numericCells = cells.map(normalizeWon).filter((value) => value > 0);
              const winnersCandidate = cells.map((cell) => {
                const compact = cell.replace(/,/g, '').trim();
                return /^\d+$/.test(compact) ? Number(compact) : 0;
              }).find((value) => value > 0 && value < 100000000);

              rows.push({
                rank,
                totalPrize: numericCells[0] || 0,
                winners: winnersCandidate || 0,
                prize: numericCells.length > 1 ? numericCells[1] : numericCells[0] || 0,
                criteria: cells.find((cell) => cell.includes('번호') || cell.includes('일치')) || '',
              });
            }
            return rows.filter((row) => row.rank >= 1 && row.rank <= 5);
          };

          async function main() {
            try {
              if (!fs.existsSync(jsonPath)) {
                console.log('lotto-results.json not found. Skipping prize enrichment.');
                return;
              }

              const data = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
              const latestDraw = data.latestDraw || data.results?.[data.results.length - 1]?.draw;
              const latest = data.results?.find((item) => item.draw === latestDraw);
              if (!latestDraw || !latest) {
                console.log('No latest draw found. Skipping prize enrichment.');
                return;
              }

              const response = await fetch(`https://www.dhlottery.co.kr/gameResult.do?method=byWin&drwNo=${latestDraw}`, {
                headers: {
                  'user-agent': 'Mozilla/5.0 GitHub Actions lotto data updater',
                  'accept-language': 'ko-KR,ko;q=0.9,en-US;q=0.8,en;q=0.7',
                },
              });

              if (!response.ok) {
                console.log(`Prize page responded ${response.status}. Skipping prize enrichment.`);
                return;
              }

              const html = await response.text();
              const prizeTiers = parsePrizeRows(html);
              if (!prizeTiers.length) {
                console.log('Prize rows were not found. Skipping prize enrichment.');
                return;
              }

              latest.prizeTiers = prizeTiers;
              const first = prizeTiers.find((row) => row.rank === 1);
              if (first) {
                latest.firstWinners = first.winners || latest.firstWinners;
                latest.firstPrize = first.prize || latest.firstPrize;
              }

              data.generatedAt = new Date().toISOString();
              fs.writeFileSync(jsonPath, `${JSON.stringify(data, null, 2)}\n`);
              fs.writeFileSync(jsPath, `window.LOTTO_RESULTS = ${JSON.stringify(data, null, 2)};\n`);
              console.log(`Prize rows enriched for draw ${latestDraw}.`);
            } catch (error) {
              console.log(`Prize enrichment skipped safely: ${error.message}`);
            }
          }

          main();
          NODE

      - name: Validate lottery data
        run: npm run validate:data -- lotto

      - name: Rebuild recall optimization profile
        run: |
          npm run optimize:recall || echo "Recall optimization skipped. Keeping the current profile."

      - name: Validate app files
        run: npm run check

      - name: Commit updated lotto data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lotto-results.json data/lotto-results.js data/lotto-recall-profile.json data/lotto-recall-profile.js
          if git diff --cached --quiet; then
            echo "No lotto data changes to commit."
          else
            git commit -m "Update lotto data"
            git push origin HEAD:${{ github.ref_name }}
          fi
