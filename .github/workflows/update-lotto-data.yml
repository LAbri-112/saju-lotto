name: Update lotto data

on:
  schedule:
    - cron: "45 11 * * 6" # 20:45 KST Saturday
    - cron: "10 12 * * 6" # 21:10 KST Saturday
    - cron: "30 12 * * 6" # 21:30 KST Saturday
    - cron: "30 0 * * 0" # Sunday safety retry
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lotto-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply draw result UI patch
        run: |
          node --check tools/apply-draw-result-ui-patch.mjs
          node tools/apply-draw-result-ui-patch.mjs
          node --check tools/apply-performance-patch.mjs
          node tools/apply-performance-patch.mjs
          node --check tools/apply-prize-net-patch.mjs
          node tools/apply-prize-net-patch.mjs
          node --check tools/apply-pension-result-ui-patch.mjs
          node tools/apply-pension-result-ui-patch.mjs

      - name: Fetch latest draw data
        run: npm run update:data

      - name: Validate lottery data
        run: npm run validate:data -- lotto

      - name: Rebuild recall optimization profile
        run: |
          npm run optimize:recall || echo "Recall optimization skipped. Keeping the current profile."

      - name: Validate app files
        run: npm run check

      - name: Commit updated lotto data and UI
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app.js styles.css service-worker.js data/lotto-results.json data/lotto-results.js data/lotto-recall-profile.json data/lotto-recall-profile.js
          if git diff --cached --quiet; then
            echo "No lotto data changes to commit."
          else
            git commit -m "Update lotto data and draw result UI"
            git push origin HEAD:${{ github.ref_name }}
          fi
